<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Outfit:wght@400;700&display=swap">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | NFT preview card component</title>
</head>

<body>
  <div class="container">
    <div class="picture">
      <img src="images/image-equilibrium.jpg" alt="">
      <div class="view">
        <img class="icon-view" src="images/icon-view.svg" alt="">
      </div>
    </div>
    <h1 class="title white onhover">
      Equilibrium #3429
    </h1>
    <p class="description soft">
      Our Equilibrium collection promotes balance and calm.
    </p>
    <div class="balance">
      <p class="balance-money">
        <img class="icon-ethereum" src="images/icon-ethereum.svg" alt="">
        &nbsp;0.041 ETH
      </p>
      <p class="balance-time soft">
        <img class="icon-clock" src="images/icon-clock.svg" alt="">
        &nbsp;3 days left
      </p>
    </div>
    <div class="line"></div>
    <div class="author">
      <img class="avatar-image" src="images/image-avatar.png" alt="">
      <p class="author-creation soft">
        Creation of
        <span class="author-name white onhover"> Jules Wyvern
        </span>
      </p>
    </div>
  </div>
</body>
</html>
